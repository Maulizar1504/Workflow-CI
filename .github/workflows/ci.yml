name: CI - Train Breast Cancer Model with MLflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn

      - name: Run MLflow Project (training)
        working-directory: MLProject
        run: mlflow run . --env-manager=local

      - name: Upload MLflow run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: MLProject/mlruns
